# DANAConnect Framework Tests — Selenium pytest configuration
#
# Auto-loaded by pytest from this directory. Two jobs:
#   1. Register custom markers so @pytest.mark.smoke etc. don't
#      emit PytestUnknownMarkWarning warnings.
#   2. Skip the lean/ subfolders in default discovery so we don't
#      accidentally run the same test twice (lean/ is a comment-
#      stripped mirror of the heavy-comment files).
#
# Run a subset by marker:
#   pytest -m smoke                → run only smoke tests
#   pytest -m "critical and login" → combine markers
#
# Run the lean mirrors explicitly:
#   pytest tests/lean/

[pytest]

markers =
    smoke: Fast smoke tests — run on every commit
    critical: Critical priority — blocks release if failing
    login: Tests related to the login feature

norecursedirs = lean .venv
