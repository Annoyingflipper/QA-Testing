# DANAConnect Framework Tests — Playwright pytest configuration
#
# This file is auto-loaded by pytest from the working directory.
# Its main purpose here: register our custom markers so pytest
# stops emitting PytestUnknownMarkWarning warnings.
#
# How to run a subset of tests by marker:
#   pytest -m smoke         → run only tests marked @pytest.mark.smoke
#   pytest -m "not smoke"   → skip smoke tests
#   pytest -m "critical and login"  → combine markers with logic

[pytest]

# ── Registered custom markers ─────────────────────────────────────
# Format: "name: human-readable description"
# Unregistered markers cause warnings; registered ones don't.
markers =
    smoke: Fast smoke tests — run on every commit
    critical: Critical priority — blocks release if failing
    login: Tests related to the login feature

# ── Default test discovery ────────────────────────────────────────
# Skip the lean/ subfolders by default so we don't run the SAME test
# twice (lean/ files are a comment-stripped copy of their sibling).
# To run lean tests explicitly:  pytest tests/lean/
norecursedirs = lean .venv
