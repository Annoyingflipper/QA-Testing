# ============================================================
# PYTEST.INI — pytest configuration file
# ============================================================
# This tells pytest how to behave when you run it.
# Think of it as "settings" for the test runner.
# ============================================================

[pytest]

# Register custom markers so pytest doesn't show warnings
# Markers are labels we attach to tests (like @pytest.mark.smoke)
markers =
    smoke: Critical path tests — run every build (< 5 min)
    security: Security-focused tests (Sam's domain)
    regression: Full regression suite (pre-release)
    performance: Performance tests (Morgan's domain)
    accessibility: Accessibility tests (Riley's domain)

# Default command-line options:
#   -v = verbose (show each test name)
#   --tb=short = shorter tracebacks on failures
#   --strict-markers = error if an unregistered marker is used
addopts = -v --tb=short --strict-markers

# Where to look for tests
testpaths = tests

# Pattern for test files
python_files = test_*.py

# Pattern for test functions
python_functions = test_*

# Pattern for test classes
python_classes = Test*
